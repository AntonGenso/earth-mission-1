<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Earth — Mission 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #050a14;
    color: #fff;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .bg {
    position: absolute;
    inset: 0;
    background-image: url('assets/bg-space.webp');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5,10,20,0.72) 0%,
      rgba(5,10,20,0) 22%,
      rgba(5,10,20,0) 60%,
      rgba(5,10,20,0.75) 78%,
      rgba(5,10,20,0.97) 100%
    );
    z-index: 1;
  }
  .top {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 52px;
    animation: fadeDown 0.8s ease both;
  }
  .mission-tag {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.35em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .title-earth {
    font-family: 'Orbitron', monospace;
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #fff;
    line-height: 1;
    text-shadow: 0 2px 24px rgba(0,0,0,0.6);
  }
  .bottom {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 32px 52px;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.8s 0.15s ease both;
  }
  .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.38);
    text-align: center;
    line-height: 1.8;
    margin-bottom: 28px;
    font-weight: 300;
    letter-spacing: 0.04em;
  }
  .btn-start {
    width: 100%;
    max-width: 260px;
    padding: 17px;
    background: #FF7B1D;
    border: none;
    border-radius: 50px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 0 32px rgba(255,123,29,0.45);
  }
  .btn-start:hover { box-shadow: 0 0 48px rgba(255,123,29,0.65); }
  .btn-start:active { transform: scale(0.96); box-shadow: 0 0 18px rgba(255,123,29,0.3); }
  .sttm-badge {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: rgba(255,255,255,0.18);
    text-transform: uppercase;
    white-space: nowrap;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-overlay"></div>
<div class="sttm-badge">Step to the Moon</div>
<div class="top">
  <div class="mission-tag">Mission 01</div>
  <div class="title-earth">Earth</div>
</div>
<div class="bottom">
  <div class="subtitle">
    Yer qanday hosil bo'lgan?<br>
    Как образовалась Земля?
  </div>
  <button class="btn-start" onclick="window.location.href='game.html'">
    Start
  </button>
</div>
</body>
</html>
